<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จำลองความ(โลภ) - By Achi🦛</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Prompt:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #020202;
            color: #e5e5e5;
            font-family: 'Prompt', sans-serif;
            background-image: radial-gradient(circle at top right, #1a1a10, transparent);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ฉากหลังเงิน Real-time */
        #money-bg-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: -1;
        }
        .bg-money {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.15;
            will-change: transform;
            transition: transform 0.1s ease-out;
        }

        .gold-gradient {
            background: linear-gradient(135deg, #d4af37 0%, #f9f295 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid #d4af37;
        }
        .item-card {
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid #333;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .item-card:hover {
            border-color: #d4af37;
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
        }
        @keyframes money-fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
        .money-particle {
            position: fixed;
            pointer-events: none;
            z-index: 150;
            font-size: 2rem;
            animation: money-fall 2s linear forwards;
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>

    <div id="money-bg-container"></div>

    <div class="sticky-header py-6 px-4">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-center md:text-left">
                <h1 class="text-3xl font-bold gold-gradient uppercase">จำลองความ(โลภ)</h1>
                <p class="text-[10px] text-zinc-500 tracking-widest">BY ACHI🦛 - THE 200 ITEMS OVERLOAD</p>
                <div class="flex items-center gap-4 mt-2">
                    <h2 id="balance" class="text-2xl md:text-4xl font-bold text-white tracking-tighter">$450,000,000,000,000</h2>
                    <button onclick="cheatX2()" class="bg-yellow-600 text-black px-4 py-1 rounded-full font-black text-xs hover:bg-white transition-all active:scale-90">โกงเงิน x2</button>
                </div>
            </div>
            <div class="text-right hidden md:block">
                <p class="text-xs text-zinc-500 uppercase">กิเลสสะสม:</p>
                <h2 id="spent-display" class="text-2xl font-bold gold-gradient">$0</h2>
            </div>
        </div>
    </div>

    <div class="container mx-auto px-4 py-10">
        <div id="item-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4"></div>
    </div>

    <div class="container mx-auto px-4 pb-20">
        <div class="bg-zinc-900 border border-zinc-800 p-6 rounded-3xl max-w-2xl mx-auto">
            <h3 class="text-xl font-bold mb-4 gold-gradient text-center">ใบเสร็จคนรวยไอ้ขมวย</h3>
            <div id="receipt-list" class="space-y-2 mb-4 max-h-60 overflow-y-auto pr-2 text-sm text-zinc-400"></div>
            <div class="border-t border-zinc-800 pt-4 flex justify-between items-center">
                <span class="font-bold">รวมยอด:</span>
                <span id="spent-final" class="text-2xl font-black text-white">$0</span>
            </div>
        </div>
    </div>

    <script>
        let balance = 450000000000000;
        let totalSpent = 0;

        // --- ระบบโกงเงิน x2 ---
        function cheatX2() {
            balance *= 2;
            spawnRain(40);
            updateUI();
        }

        function spawnRain(num) {
            for(let i=0; i<num; i++) {
                const m = document.createElement('div');
                m.innerText = '💸'; m.className = 'money-particle';
                m.style.left = Math.random() * 100 + 'vw';
                m.style.animationDelay = Math.random() * 0.3 + 's';
                document.body.appendChild(m);
                setTimeout(() => m.remove(), 2000);
            }
        }

        // --- ฉากหลัง Real-time 100 ใบ ---
        const bgContainer = document.getElementById('money-bg-container');
        const bgElements = [];
        for(let i=0; i<100; i++) {
            const el = document.createElement('div');
            el.innerText = '💸'; el.className = 'bg-money';
            el.style.left = Math.random() * 100 + 'vw';
            el.style.top = Math.random() * 100 + 'vh';
            bgContainer.appendChild(el);
            bgElements.push(el);
        }

        window.addEventListener('deviceorientation', (e) => {
            const x = e.gamma || 0; const y = e.beta || 0;
            bgElements.forEach(el => {
                el.style.transform = `translate(${x * 2}px, ${y * 2}px)`;
            });
        });

        // --- ข้อมูลสินค้า 200 อย่าง ---
        const brands = ["iPhone", "Samsung", "Xiaomi", "OPPO", "ROG", "Pixel", "Vivo", "OnePlus", "Huawei", "Sony", "Honor", "Nothing", "Redmagic", "Realme", "Motorola"];
        const phoneModels = ["Pro Max Ultra", "Ultimate Z", "Flagship Edition", "Master 5G", "Titanium Fold", "Cyber Edition"];
        const luxuries = ["เกาะส่วนตัว", "สถานีอวกาศ", "กองทัพหุ่นยนต์", "เหมืองบิทคอยน์", "บ่อน้ำมัน", "ทีมฟุตบอล", "เรือรบนิวเคลียร์", "เมืองจำลอง"];

        const items = [];
        for (let i = 0; i < 200; i++) {
            let name, emoji, price;
            if (i < 50) { // มือถือ 50 รุ่นแรก
                name = `${brands[i % brands.length]} ${phoneModels[i % phoneModels.length]} v${i+1}`;
                emoji = "📱";
                price = 1000 * (i + 1) * 1.5;
            } else {
                name = `${luxuries[i % luxuries.length]} รหัส ${i*7}`;
                emoji = ["🚢", "🏝️", "🚀", "🏦", "💎", "🏰", "🤖", "🚁"][i % 8];
                price = 1000000 * (i - 48) * 10;
            }
            items.push({ id: i, name, price, emoji, count: 0 });
        }

        function updateUI() {
            const current = balance - totalSpent;
            document.getElementById('balance').innerText = "$" + current.toLocaleString();
            document.getElementById('spent-display').innerText = "$" + totalSpent.toLocaleString();
            document.getElementById('spent-final').innerText = "$" + totalSpent.toLocaleString();
            renderReceipt();
        }

        function handleTransaction(id, isBuy) {
            const item = items.find(i => i.id === id);
            const input = document.getElementById(`in-${id}`);
            const val = parseInt(input.value) || 0;
            if (val <= 0) return;

            if (isBuy) {
                const cost = item.price * val;
                if ((balance - totalSpent) >= cost) {
                    item.count += val; totalSpent += cost;
                    spawnRain(10);
                } else {
                    alert("กิเลสหนาแต่กระเป๋าบาง! ไปโกงเงินมาเพิ่มซะไอ้ขมวยหัวเคน");
                }
            } else {
                const sellCount = Math.min(val, item.count);
                item.count -= sellCount; totalSpent -= (item.price * sellCount);
            }
            document.getElementById(`cnt-${id}`).innerText = item.count.toLocaleString();
            updateUI();
        }

        function renderReceipt() {
            const bought = items.filter(i => i.count > 0);
            const list = document.getElementById('receipt-list');
            if (bought.length === 0) { list.innerHTML = 'ยังไม่มีกิเลส...'; return; }
            list.innerHTML = bought.map(i => `<div>${i.emoji} ${i.name} x${i.count.toLocaleString()} - <span class="text-yellow-500">$${(i.price * i.count).toLocaleString()}</span></div>`).join('');
        }

        const grid = document.getElementById('item-grid');
        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'item-card p-4 rounded-2xl text-center';
            card.innerHTML = `
                <div class="text-4xl mb-2">${item.emoji}</div>
                <h4 class="text-[10px] font-bold h-8 overflow-hidden">${item.name}</h4>
                <p class="text-yellow-500 font-mono text-[10px] mb-2">$${item.price.toLocaleString()}</p>
                <div class="bg-black/40 py-1 rounded-lg mb-2 text-sm font-bold gold-gradient" id="cnt-${item.id}">0</div>
                <input type="number" id="in-${item.id}" placeholder="จำนวน" class="w-full bg-zinc-800 text-center rounded py-1 text-xs mb-2 outline-none border border-zinc-700 focus:border-yellow-500">
                <div class="flex gap-1">
                    <button onclick="handleTransaction(${item.id}, false)" class="flex-1 bg-zinc-700 py-1 rounded text-[10px] font-bold">ขาย</button>
                    <button onclick="handleTransaction(${item.id}, true)" class="flex-[2] bg-yellow-600 py-1 rounded text-[10px] font-bold text-black">ซื้อ</button>
                </div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>

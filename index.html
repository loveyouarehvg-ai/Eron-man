<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จำลองความ(โลภ) - By Achi🦛</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Prompt:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #020202;
            color: #e5e5e5;
            font-family: 'Prompt', sans-serif;
            background-image: radial-gradient(circle at top right, #1a1a10, transparent);
            overflow-x: hidden;
            min-height: 100vh;
        }

        #money-bg-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }
        .bg-money {
            position: absolute;
            font-size: 1.8rem;
            opacity: 0.25;
            transition: transform 0.1s ease-out;
            will-change: transform;
        }
        @keyframes float-around {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }
        .floating-anim { animation: float-around 4s ease-in-out infinite; }

        .luxury-text { font-family: 'Cinzel', serif; letter-spacing: 2px; }
        .gold-gradient {
            background: linear-gradient(135deg, #d4af37 0%, #f9f295 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4));
        }
        .sticky-money {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid #d4af37;
        }
        .item-card {
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid #333;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .item-card:hover {
            border-color: #d4af37;
            transform: translateY(-8px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
        }
        
        @keyframes bounce-click {
            0% { transform: scale(1); }
            30% { transform: scale(0.8) rotate(-2deg); }
            50% { transform: scale(1.2) rotate(2deg); }
            100% { transform: scale(1); }
        }
        .bouncy-active { animation: bounce-click 0.5s forwards; }
        
        @keyframes money-fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
        .money-particle {
            position: fixed;
            pointer-events: none;
            z-index: 200;
            font-size: 2.5rem;
            animation: money-fall 2.5s linear forwards;
        }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>

    <div id="money-bg-container"></div>

    <div class="text-center py-12">
        <h1 id="main-title" class="text-6xl mb-3 luxury-text gold-gradient font-black uppercase cursor-pointer transition-all active:scale-95">จำลองความ(โลภ)</h1>
        <p class="text-zinc-500 tracking-widest uppercase text-sm font-bold">By Achi🦛 - The 200 Items Empire</p>
    </div>

    <div class="sticky-money py-8 px-4">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="text-center md:text-left">
                <p class="text-zinc-500 uppercase text-xs font-bold tracking-widest mb-1">ความมั่งคั่งมหาศาล</p>
                <div class="flex items-center gap-4">
                    <h2 id="balance" class="text-3xl md:text-5xl font-bold gold-gradient tracking-tighter">$450,000,000,000,000</h2>
                    <button id="cheat-btn" onclick="cheatX2()" class="bg-yellow-600 text-black px-6 py-2 rounded-full font-black hover:bg-white transition-all shadow-[0_0_20px_#d4af37] active:scale-90">โกงเงิน x2</button>
                </div>
            </div>
            <div class="text-center md:text-right">
                <p class="text-zinc-500 uppercase text-xs font-bold tracking-widest mb-1">ยอดกิเลสสะสม</p>
                <h2 id="spent-display" class="text-3xl font-bold text-white opacity-80">$0</h2>
            </div>
        </div>
    </div>

    <div class="container mx-auto px-6 py-16">
        <div id="item-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
    </div>

    <div class="container mx-auto px-6 pb-32">
        <div class="bg-zinc-950 p-10 rounded-3xl border border-zinc-800 max-w-3xl mx-auto shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-1 h-full bg-yellow-600"></div>
            <h3 id="receipt-title" class="text-3xl luxury-text mb-8 text-center gold-gradient font-bold uppercase">ใบเสร็จแห่งความโลภ</h3>
            <div id="receipt-list" class="space-y-4 mb-8 border-b border-zinc-800 pb-8 text-zinc-400 max-h-96 overflow-y-auto"></div>
            <div class="flex justify-between items-center">
                <span class="text-2xl font-light uppercase tracking-widest text-zinc-500">รวมกิเลส:</span>
                <span id="spent-final" class="text-4xl font-black gold-gradient">$0</span>
            </div>
        </div>
    </div>

    <script>
        let balance = 450000000000000;
        let totalSpent = 0;

        // --- 1. ฉากหลัง Real-time (💸👛🤑💲💴💵) ---
        const bgContainer = document.getElementById('money-bg-container');
        const bgEmojis = ['💸', '👛', '🤑', '💲', '💴', '💵'];
        const bgElements = [];
        for(let i=0; i<80; i++) {
            const el = document.createElement('div');
            el.innerText = bgEmojis[i % bgEmojis.length];
            el.className = 'bg-money floating-anim';
            el.style.left = Math.random() * 100 + 'vw';
            el.style.top = Math.random() * 100 + 'vh';
            bgContainer.appendChild(el);
            bgElements.push(el);
        }

        window.addEventListener('deviceorientation', (e) => {
            const x = e.gamma || 0; const y = e.beta || 0;
            bgElements.forEach(el => el.style.transform = `translate(${x * 1.5}px, ${y * 1.5}px)`);
        });

        // --- 2. ฟังก์ชันโกงเงิน x2 (Easter Egg: Pulse) ---
        function cheatX2() {
            balance *= 2;
            spawnRain(40);
            updateUI();
        }

        function spawnRain(num) {
            for(let i=0; i<num; i++) {
                const m = document.createElement('div');
                m.innerText = bgEmojis[Math.floor(Math.random()*bgEmojis.length)];
                m.className = 'money-particle';
                m.style.left = Math.random() * 100 + 'vw';
                m.style.animationDelay = Math.random() * 0.5 + 's';
                document.body.appendChild(m);
                setTimeout(() => m.remove(), 2500);
            }
        }

        // --- 3. สร้างข้อมูล 200 อย่าง (มือถือจริง 50 รุ่น + ของรวยๆ) ---
        const phoneBrands = ["iPhone 17", "Samsung S26", "OPPO Reno 13", "Xiaomi 16", "ROG Phone 10", "Pixel 10", "Vivo X200", "OnePlus 14", "Huawei Mate 80", "Sony Xperia 1 VIII"];
        const phoneSfx = ["Pro Max", "Ultra", "Global Edition", "Supreme", "Fold Titanium", "Ultimate"];
        const luxuries = ["เกาะส่วนตัว", "สถานีอวกาศ ISS", "สโมสรฟุตบอล", "เหมืองทองคำ", "กองทัพหุ่นยนต์", "ธนาคารกลาง", "ยานแม่ SpaceX", "เมืองส่วนตัวใน Metaverse"];

        const items = [];
        for (let i = 0; i < 200; i++) {
            let name, emoji, price;
            if (i < 50) { // มือถือ 50 รุ่นแรก ราคาอิงความจริง
                name = `${phoneBrands[i % phoneBrands.length]} ${phoneSfx[i % phoneSfx.length]} (Model-${i})`;
                emoji = "📱";
                price = (1200 + (i * 50)); 
            } else { // ของสะสมมหาศาล
                name = `${luxuries[i % luxuries.length]} รุ่นพิเศษ #${i}`;
                emoji = ["🏰", "🚢", "🛰️", "💎", "🏝️", "🚀", "🏦", "🚁"][i % 8];
                price = 1000000 * (i - 40) * (i);
            }
            items.push({ id: i, name, price, emoji, count: 0 });
        }

        function updateUI() {
            const current = balance - totalSpent;
            const balEl = document.getElementById('balance');
            balEl.innerText = "$" + current.toLocaleString();
            document.getElementById('spent-display').innerText = "$" + totalSpent.toLocaleString();
            document.getElementById('spent-final').innerText = "$" + totalSpent.toLocaleString();
            
            // Easter Egg: Money Pulse
            if(balance > 10000000000000000) balEl.classList.add('animate-pulse');
            renderReceipt();
        }

        function handleTransaction(id, isBuy) {
            const item = items.find(i => i.id === id);
            const input = document.getElementById(`in-${id}`);
            const card = document.getElementById(`card-${id}`);
            const val = parseInt(input.value) || 0;
            if (val <= 0) return;

            card.classList.remove('bouncy-active');
            void card.offsetWidth;
            card.classList.add('bouncy-active');

            if (isBuy) {
                const cost = item.price * val;
                if ((balance - totalSpent) >= cost) {
                    item.count += val;
                    totalSpent += cost;
                    spawnRain(10);
                    if(val > 1000) console.log("%cACHI: พลังแห่งกิเลสช่างรุนแรง!", "color: gold; font-size: 20px;");
                } else {
                    // Easter Egg: Greed Alert
                    alert("กิเลสหนาแต่กระเป๋าบาง! ไปโกงเงินมาเพิ่มซะไอ้ขมวยหัวเคน");
                }
            } else {
                const sellCount = Math.min(val, item.count);
                item.count -= sellCount;
                totalSpent -= (item.price * sellCount);
            }
            document.getElementById(`cnt-${id}`).innerText = item.count.toLocaleString();
            updateUI();
        }

        function renderReceipt() {
            const bought = items.filter(i => i.count > 0);
            const list = document.getElementById('receipt-list');
            if (bought.length > 10) document.getElementById('receipt-title').innerText = "ตำนานมหาเศรษฐี ACHI";
            if (bought.length === 0) {
                list.innerHTML = '<p class="text-center italic opacity-50">ยังไม่มีกิเลส...</p>';
                return;
            }
            let html = bought.map(i => `
                <div class="flex justify-between items-center border-b border-zinc-900 pb-2">
                    <div class="flex items-center gap-2">
                        <span class="text-xl">${i.emoji}</span>
                        <span class="text-white font-bold text-sm">${i.name}</span>
                        <span class="text-xs text-zinc-600">x${i.count.toLocaleString()}</span>
                    </div>
                    <span class="text-yellow-600 font-mono text-sm">$${(i.price * i.count).toLocaleString()}</span>
                </div>
            `).join('');
            
            if(totalSpent > 1000000000000) html += '<p class="text-center text-xs text-yellow-500 mt-4">🏆 ฉายา: ผู้กลืนกินดวงดาว</p>';
            list.innerHTML = html;
        }

        const grid = document.getElementById('item-grid');
        items.forEach(item => {
            const card = document.createElement('div');
            card.id = `card-${item.id}`;
            card.className = 'item-card p-6 rounded-3xl flex flex-col items-center text-center relative overflow-hidden';
            card.innerHTML = `
                <div class="text-5xl mb-4 transition-all hover:scale-125 cursor-help">${item.emoji}</div>
                <h3 class="text-sm font-bold text-white mb-1 h-10 flex items-center">${item.name}</h3>
                <p class="text-yellow-500 font-mono text-xs mb-4">$${item.price.toLocaleString()}</p>
                <div class="bg-black/40 p-2 rounded-xl w-full mb-4">
                    <span id="cnt-${item.id}" class="text-xl font-bold gold-gradient">0</span>
                </div>
                <div class="grid grid-cols-1 w-full gap-2">
                    <input type="number" id="in-${item.id}" placeholder="จำนวน..." class="bg-zinc-900 border border-zinc-700 text-center py-2 rounded-lg text-white text-xs outline-none focus:border-yellow-600">
                    <div class="flex gap-2">
                        <button onclick="handleTransaction(${item.id}, false)" class="flex-1 bg-zinc-800 py-2 rounded-lg text-[10px] font-bold uppercase">ขาย</button>
                        <button onclick="handleTransaction(${item.id}, true)" class="flex-[2] bg-yellow-600 text-black py-2 rounded-lg text-[10px] font-bold uppercase hover:bg-yellow-400">ซื้อ</button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });

        // Easter Egg: Title Color
        document.getElementById('main-title').onclick = function() {
            this.style.filter = `hue-rotate(${Math.random() * 360}deg)`;
            spawnRain(50);
        };
    </script>
</body>
</html>

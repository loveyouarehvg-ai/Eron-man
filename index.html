<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จำลองความ(โลภ) - By Achi🦛</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Prompt:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #020202;
            color: #e5e5e5;
            font-family: 'Prompt', sans-serif;
            background-image: radial-gradient(circle at top right, #1a1a10, transparent);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ฉากหลังเงินลอย */
        #money-bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }
        .bg-money {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.2;
            transition: transform 0.1s ease-out;
            will-change: transform;
        }
        @keyframes float-around {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }
        .floating-anim { animation: float-around 4s ease-in-out infinite; }

        .luxury-text { font-family: 'Cinzel', serif; letter-spacing: 2px; }
        .gold-gradient {
            background: linear-gradient(135deg, #d4af37 0%, #f9f295 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));
        }
        .sticky-money {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.5);
        }
        .item-card {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid #333;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .item-card:hover {
            border-color: #d4af37;
            transform: translateY(-8px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.15);
        }

        /* Animation เด้งดึ๋ง */
        @keyframes bounce-click {
            0% { transform: scale(1); }
            30% { transform: scale(0.8) rotate(-2deg); }
            50% { transform: scale(1.2) rotate(2deg); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
        .bouncy-active { animation: bounce-click 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        /* Money Rain แบบเยอะๆๆ */
        @keyframes money-fall {
            0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) translateX(150px) rotate(720deg); opacity: 0; }
        }
        .money-particle {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            font-size: 2.5rem;
            animation: money-fall 2.5s linear forwards;
        }

        button { transition: all 0.2s; cursor: pointer; }
        button:active { transform: scale(0.9) !important; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }
    </style>
</head>
<body>

    <div id="money-bg-container"></div>

    <div class="text-center py-12 border-b border-zinc-900">
        <h1 id="main-title" class="text-6xl mb-3 luxury-text gold-gradient font-bold uppercase cursor-pointer transition-all active:scale-95">จำลองความ(โลภ)</h1>
        <p class="text-zinc-500 tracking-widest uppercase text-sm font-bold">By Achi🦛 - Ultimate Wealth Simulator</p>
    </div>

    <div class="sticky-money py-8 px-4">
        <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
            <div class="text-center md:text-left flex flex-col items-center md:items-start">
                <p class="text-zinc-500 uppercase text-xs tracking-widest mb-1 font-bold">ความมั่งคั่งที่เหลืออยู่</p>
                <div class="flex items-center gap-4">
                    <h2 id="balance" class="text-4xl md:text-6xl font-bold gold-gradient tracking-tighter">$450,000,000,000,000</h2>
                    <button id="cheat-btn" onclick="addMoney()" class="relative z-[60] bg-yellow-600 text-black px-6 py-2 rounded-full text-sm font-bold hover:bg-yellow-400 hover:scale-105 transition-all shadow-[0_0_20px_#d4af37] active:bg-white">โกงเงิน</button>
                </div>
            </div>
            <div class="text-center md:text-right">
                <p class="text-zinc-500 uppercase text-xs tracking-widest mb-1 font-bold">มูลค่ากิเลสสะสม</p>
                <h2 id="total-spent-display" class="text-3xl md:text-4xl font-bold text-white opacity-80">$0</h2>
            </div>
        </div>
    </div>

    <div class="container mx-auto px-6 py-16">
        <div id="item-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
    </div>

    <div class="container mx-auto px-6 pb-32">
        <div class="bg-zinc-950 p-10 rounded-2xl border border-zinc-800 max-w-3xl mx-auto shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-1 h-full bg-yellow-600"></div>
            <h3 id="receipt-title" class="text-3xl luxury-text mb-8 text-center gold-gradient font-bold uppercase">ใบเสร็จแห่งความโลภ</h3>
            <div id="receipt-list" class="space-y-4 mb-8 border-b border-zinc-800 pb-8 text-zinc-400">
                <p class="text-center italic opacity-50">ยังไม่มีการตอบสนองต่อกิเลส</p>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-2xl font-light uppercase tracking-widest">ยอดรวมกิเลส:</span>
                <span id="total-spent-final" class="text-4xl font-bold gold-gradient">$0</span>
            </div>
        </div>
    </div>

    <script>
        let balance = 450000000000000; 
        let totalSpent = 0;
        const items = [];

        // ฉากหลังเงิน
        const bgContainer = document.getElementById('money-bg-container');
        const bgMoneyElements = [];

        for (let i = 0; i < 35; i++) {
            const el = document.createElement('div');
            el.innerText = '💸';
            el.className = 'bg-money floating-anim';
            el.style.left = Math.random() * 100 + 'vw';
            el.style.top = Math.random() * 100 + 'vh';
            el.style.animationDelay = Math.random() * 5 + 's';
            bgContainer.appendChild(el);
            bgMoneyElements.push({ el: el });
        }

        window.addEventListener('deviceorientation', (event) => {
            const tiltX = event.gamma || 0;
            const tiltY = event.beta || 0;
            bgMoneyElements.forEach((item) => {
                item.el.style.transform = `translate(${tiltX * 0.8}px, ${tiltY * 0.8}px)`;
            });
        });

        // ฟังก์ชันโกงเงิน (แบบเงินถล่มเยอะๆๆ)
        function addMoney() {
            balance += 50000000000000; // เพิ่มทีละ 50 ล้านล้าน
            spawnMoney(40); // พ่นเงินออกมา 40 ใบสะใจๆ
            updateUI();
        }

        function spawnMoney(count = 15) {
            for(let i=0; i < count; i++) {
                const money = document.createElement('div');
                money.innerText = '💸';
                money.className = 'money-particle';
                money.style.left = Math.random() * 100 + 'vw';
                money.style.animationDelay = Math.random() * 0.5 + 's';
                document.body.appendChild(money);
                setTimeout(() => money.remove(), 2500);
            }
        }

        const itemNames = [
            { n: "เบอร์เกอร์เนื้อวากิวทองคำ", p: 150, e: "🍔" },
            { n: "กาแฟขี้ชะมดสกัดเย็น", p: 35, e: "☕" },
            { n: "OPPO Reno 11 Pro 5G", p: 600, e: "📱" },
            { n: "หูฟังทองคำแท้ Custom", p: 2500, e: "🎧" },
            { n: "นาฬิกา Richard Mille (Rare)", p: 1500000, e: "⌚" },
            { n: "Tesla Roadster 2.0", p: 250000, e: "🏎️" },
            { n: "คฤหาสน์หรู Beverly Hills", p: 65000000, e: "🏰" },
            { n: "เรือยอร์ช SuperYacht 150m", p: 450000000, e: "🚢" },
            { n: "เกาะส่วนตัวในบาฮามาส", p: 35000000, e: "🏝️" },
            { n: "สโมสร Manchester United", p: 6500000000, e: "⚽" },
            { n: "จรวด SpaceX Falcon 9", p: 67000000, e: "🚀" },
            { n: "กองทัพโดรนป้องกันฐานทัพ", p: 15000000, e: "🤖" },
            { n: "บ่อน้ำมัน (Commercial Well)", p: 85000000, e: "🛢️" },
            { n: "เครื่องบินรบ F-35 Lightning II", p: 80000000, e: "✈️" },
            { n: "ซื้อประเทศขนาดเล็ก", p: 1500000000, e: "🚩" },
            { n: "เรือบรรทุกเครื่องบินชั้น Ford", p: 13000000000, e: "⚓" },
            { n: "สถานีอวกาศ ISS ส่วนตัว", p: 150000000000, e: "🛰️" },
            { n: "สิทธิสัมปทานเหมืองทองคำ", p: 550000000, e: "⛏️" },
            { n: "มหาสมุทร (สัมปทานวิจัย)", p: 2500000000, e: "🌊" },
            { n: "ธนาคารพาณิชย์ขนาดใหญ่", p: 8500000000, e: "🏦" }
        ];

        for (let i = 0; i < 100; i++) {
            const base = itemNames[i % itemNames.length];
            let tierMult = 1 + (Math.floor(i / itemNames.length) * 0.2); 
            items.push({
                id: i,
                name: base.n + " รุ่นที่ " + (Math.floor(i/itemNames.length)+1),
                price: Math.floor(base.p * tierMult),
                emoji: base.e,
                count: 0
            });
        }

        const balanceEl = document.getElementById('balance');
        const spentDisplay = document.getElementById('total-spent-display');
        const spentFinal = document.getElementById('total-spent-final');
        const receiptList = document.getElementById('receipt-list');

        function updateUI() {
            const currentBalance = balance - totalSpent;
            balanceEl.innerText = "$" + currentBalance.toLocaleString();
            spentDisplay.innerText = "$" + totalSpent.toLocaleString();
            spentFinal.innerText = "$" + totalSpent.toLocaleString();
            renderReceipt();
        }

        function handleTransaction(id, isBuy) {
            const item = items.find(i => i.id === id);
            const input = document.getElementById(`input-${id}`);
            const card = document.getElementById(`card-${id}`);
            const amount = parseInt(input.value) || 0;

            if (amount <= 0) return;

            card.classList.remove('bouncy-active');
            void card.offsetWidth; 
            card.classList.add('bouncy-active');

            if (isBuy) {
                const cost = item.price * amount;
                if ((balance - totalSpent) >= cost) {
                    item.count += amount;
                    totalSpent += cost;
                    spawnMoney(20);
                } else {
                    // Greed Alert ใหม่ตามสั่ง!
                    alert("กิเลสหนาแต่กระเป๋าบาง! ไปโกงเงินมาเพิ่มซะ");
                }
            } else {
                const sellCount = Math.min(amount, item.count);
                item.count -= sellCount;
                totalSpent -= (item.price * sellCount);
            }
            document.getElementById(`count-${id}`).innerText = item.count.toLocaleString();
            updateUI();
        }

        function renderReceipt() {
            const boughtItems = items.filter(i => i.count > 0);
            if (boughtItems.length === 0) {
                receiptList.innerHTML = '<p class="text-center italic opacity-50">ยังไม่มีการตอบสนองต่อกิเลส</p>';
                return;
            }
            receiptList.innerHTML = boughtItems.map(i => `
                <div class="flex justify-between items-center border-b border-zinc-900 pb-2">
                    <div><span class="text-white font-bold">${i.emoji} ${i.name}</span><span class="text-xs ml-2">x ${i.count.toLocaleString()}</span></div>
                    <span class="text-yellow-600 font-mono">$${(i.price * i.count).toLocaleString()}</span>
                </div>
            `).join('');
        }

        const grid = document.getElementById('item-grid');
        items.forEach(item => {
            const card = document.createElement('div');
            card.id = `card-${item.id}`;
            card.className = 'item-card p-8 rounded-3xl flex flex-col items-center text-center relative overflow-hidden';
            card.innerHTML = `
                <div class="text-6xl mb-6 filter drop-shadow-lg transition-all hover:scale-125">${item.emoji}</div>
                <h3 class="text-xl font-bold mb-2 text-white">${item.name}</h3>
                <p class="text-yellow-500 font-mono text-lg mb-6">$${item.price.toLocaleString()}</p>
                <div class="bg-black/40 p-4 rounded-2xl w-full mb-4">
                    <p class="text-xs text-zinc-500 uppercase mb-2 font-bold tracking-widest">สะสมแล้ว</p>
                    <span id="count-${item.id}" class="text-2xl font-bold gold-gradient">0</span>
                </div>
                <div class="grid grid-cols-1 w-full gap-3 mt-auto">
                    <input type="number" id="input-${item.id}" placeholder="ระบุจำนวน..." class="bg-zinc-900 border border-zinc-700 text-center py-3 rounded-xl focus:outline-none focus:border-yellow-600 transition-all text-white font-bold">
                    <div class="flex gap-2">
                        <button onclick="handleTransaction(${item.id}, false)" class="flex-1 bg-zinc-800 hover:bg-red-900 py-3 rounded-xl font-bold transition-all text-sm uppercase">ขาย</button>
                        <button onclick="handleTransaction(${item.id}, true)" class="flex-[2] bg-yellow-600 hover:bg-yellow-500 text-black py-3 rounded-xl font-bold transition-all text-sm uppercase shadow-[0_5px_15px_rgba(212,175,55,0.3)]">บูชาความโลภ</button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });

        // Easter Egg: Title Click
        document.getElementById('main-title').onclick = function() {
            this.style.filter = `hue-rotate(${Math.random() * 360}deg)`;
            spawnMoney(50);
        };
    </script>
</body>
</html>

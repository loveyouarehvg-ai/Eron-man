<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จำลองความ(โลภ) - By Achi🦛</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: #e5e5e5;
            font-family: 'Prompt', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            transition: transform 0.1s, background-color 0.5s;
        }

        /* 1. Screen Shake */
        .screen-shake {
            animation: shake-screen 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake-screen {
            10%, 90% { transform: translate3d(-4px, 0, 0); }
            20%, 80% { transform: translate3d(8px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-12px, 0, 0); }
            40%, 60% { transform: translate3d(12px, 0, 0); }
        }

        #money-bg-container {
            position: fixed;
            top: -10%; left: -10%;
            width: 120vw; height: 120vh;
            pointer-events: none;
            z-index: -1;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-content: space-around;
        }
        .bg-emoji { font-size: 2.5rem; opacity: 0.12; filter: blur(1px); transition: transform 0.1s ease-out; }

        .gold-gradient {
            background: linear-gradient(135deg, #d4af37 0%, #f9f295 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .sticky-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid #d4af37;
        }

        .item-card {
            background: rgba(25, 25, 25, 0.6);
            border: 1px solid #333;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .item-card:hover {
            border-color: #d4af37;
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.15);
        }

        .emoji-icon { transition: transform 0.3s; display: inline-block; cursor: help; }
        .item-card:hover .emoji-icon { animation: emoji-shake 0.5s infinite linear; }
        @keyframes emoji-shake {
            0% { transform: rotate(0); }
            25% { transform: rotate(15deg) scale(1.2); }
            75% { transform: rotate(-15deg) scale(1.2); }
            100% { transform: rotate(0); }
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
        .particle {
            position: fixed;
            top: -10vh;
            pointer-events: none;
            z-index: 200;
            animation: fall 3s linear forwards;
            font-weight: 900;
        }
        
        /* 6. Ultra Rich Pulse */
        .ultra-rich { animation: pulse-rich 0.5s infinite alternate; }
        @keyframes pulse-rich {
            from { transform: scale(1); text-shadow: 0 0 10px #d4af37; }
            to { transform: scale(1.05); text-shadow: 0 0 30px #f9f295; }
        }
    </style>
</head>
<body>

    <div id="money-bg-container"></div>

    <div class="text-center py-12">
        <h1 id="title-main" class="text-6xl font-black gold-gradient uppercase cursor-pointer select-none transition-all active:scale-75">จำลองความ(โลภ)</h1>
        <p class="text-zinc-500 text-xs tracking-[0.5em] mt-3 font-bold">BY ACHI🦛 - 10 EASTER EGGS ACTIVE</p>
    </div>

    <div class="sticky-nav py-8 px-6 shadow-2xl">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-8">
                <div class="text-left">
                    <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">คลังสมบัติของ Achi</p>
                    <h2 id="balance-display" class="text-4xl md:text-6xl font-black text-white tracking-tighter transition-all cursor-crosshair select-none">$450,000,000,000,000</h2>
                </div>
                <button onclick="cheatX2()" class="bg-yellow-500 text-black font-black px-8 py-4 rounded-3xl hover:bg-white active:scale-90 transition-all text-xl shadow-[0_0_20px_#d4af37]">โกงเงิน x2</button>
            </div>
            <div class="text-center md:text-right">
                <p id="rank-tag" class="text-[10px] text-yellow-500 font-bold uppercase tracking-widest mb-1 animate-pulse">สถานะ: ผู้แสวงหาเศษเงิน</p>
                <h2 id="spent-total" class="text-3xl font-bold text-zinc-400">$0</h2>
            </div>
        </div>
    </div>

    <div class="container mx-auto px-2 py-20">
        <div id="item-grid" class="grid grid-cols-3 gap-2 md:gap-12"></div>
    </div>

    <div class="container mx-auto px-6 pb-40">
        <div id="receipt-box" class="bg-zinc-950 p-12 rounded-[3.5rem] border border-zinc-800 max-w-4xl mx-auto shadow-2xl relative overflow-hidden transition-all">
            <h3 id="receipt-header" class="text-4xl font-black mb-10 text-center gold-gradient uppercase">ใบเสร็จแห่งกิเลส</h3>
            <div id="receipt-content" class="space-y-4 mb-10 max-h-80 overflow-y-auto text-zinc-500">
                <p class="text-center italic opacity-30">กิเลสยังไม่เกิด...</p>
            </div>
            <div class="flex justify-between items-end border-t border-zinc-800 pt-8">
                <span class="text-xl font-bold text-zinc-500 uppercase">รวมยอดความโลภ:</span>
                <span id="final-price" class="text-5xl font-black text-white">$0</span>
            </div>
        </div>
    </div>

    <script>
        let balance = 450000000000000;
        let totalSpent = 0;
        let clickCount = 0;
        let lastClickTime = 0;
        let isGodMode = false;
        const bgEmojis = ['💸', '👛', '🤑', '💲', '💴', '💵'];

        // 7. Gyro Effect
        const bg = document.getElementById('money-bg-container');
        for(let i=0; i<100; i++){
            const span = document.createElement('span');
            span.className = 'bg-emoji';
            span.innerText = bgEmojis[Math.floor(Math.random()*bgEmojis.length)];
            bg.appendChild(span);
        }
        window.addEventListener('deviceorientation', (e) => {
            const x = (e.gamma || 0) * 1.5;
            const y = (e.beta || 0) * 1.5;
            bg.style.transform = `translate(${x}px, ${y}px)`;
        });

        const phones = ["iPhone 17 Pro Max", "Samsung S26 Ultra", "OPPO Reno 13 Pro", "Xiaomi 16 Ultra", "ROG Phone 10 Pro", "Pixel 10", "Z Fold 8 Luxury", "Nokia 3310 Gold Edition"];
        const richesList = [
            { n: "เกาะส่วนตัว", e: "🏝️" },
            { n: "คฤหาสน์หรู", e: "🏰" },
            { n: "เรือยอร์ชมังกร", e: "🚢" },
            { n: "สถานีอวกาศ", e: "🚀" },
            { n: "สโมสรแมนยู", e: "⚽" }, 
            { n: "กองทัพหุ่นยนต์", e: "🤖" },
            { n: "บ่อน้ำมัน", e: "⛽" },
            { n: "ดาวเทียมทองคำ", e: "🛰️" },
            { n: "ธนาคารกลาง", e: "🏦" },
            { n: "เครื่องบินรบ F-35", e: "🛩️" }
        ];

        const items = [];
        for(let i=0; i<200; i++) {
            let it = {};
            if(i % 4 === 0 && (i/4) < 50) {
                it = { id: i, name: phones[Math.floor(i/4)%phones.length] + ` (Achi Ed.)`, price: 1500+(i*100), emoji: '📱', count: 0 };
            } else {
                const luxData = richesList[i % richesList.length];
                it = { id: i, name: luxData.n + ` #${i}`, price: 1000000*(i+1)*5, emoji: luxData.e, count: 0 };
            }
            items.push(it);
        }

        // 3. Cheat x2
        function cheatX2() {
            balance *= 2;
            for(let i=0; i<40; i++) spawnParticle();
            updateUI();
        }

        function spawnParticle(emojiOverride) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.innerText = emojiOverride || bgEmojis[Math.floor(Math.random()*bgEmojis.length)];
            p.style.left = Math.random() * 100 + 'vw';
            p.style.fontSize = (Math.random() * 2 + 1) + 'rem';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 3000);
        }

        function updateUI() {
            const current = balance - totalSpent;
            const balDisplay = document.getElementById('balance-display');
            
            if(isGodMode) {
                balDisplay.innerText = "INFINITY $";
                document.getElementById('rank-tag').innerText = "สถานะ: ผู้ไร้ขอบเขตมิติที่ 5";
            } else {
                balDisplay.innerText = "$" + current.toLocaleString();
                const rank = document.getElementById('rank-tag');
                if(totalSpent > 10000000000000) rank.innerText = "สถานะ: พระเจ้าแห่งทองคำ";
                else if(totalSpent > 1000000000) rank.innerText = "สถานะ: มหาเศรษฐีข้ามมิติ";
                else if(totalSpent > 0) rank.innerText = "สถานะ: ผู้เริ่มมีตัง";
            }

            // 6. Ultra Rich Pulse
            if(current > 1000000000000000 || isGodMode) {
                balDisplay.classList.add('ultra-rich');
            } else {
                balDisplay.classList.remove('ultra-rich');
            }
            renderReceipt();
        }

        function buy(id) {
            // 8. Grandma Safety (Spam Detection)
            const now = Date.now();
            if (now - lastClickTime < 2000) clickCount++;
            else clickCount = 0;
            lastClickTime = now;
            if(clickCount > 10) {
                alert("ย่าบอกว่า: 'ซื้อเยอะไปแล้วนะลูก เดี๋ยวเครื่องร้อน ระวังไฟดูด!'");
                clickCount = 0;
                return;
            }

            const item = items.find(x => x.id === id);
            const input = document.getElementById(`in-${id}`);
            const qty = parseInt(input.value) || 0;
            if(qty <= 0) return;
            
            // 2. Secret Combo 999
            if(qty === 999) {
                console.log("%cACHI SECRET: THE GREED OF 999", "color: gold; font-size: 20px;");
                for(let i=0; i<50; i++) setTimeout(() => spawnParticle('💎'), i * 50);
            }

            const cost = item.price * qty;
            if(isGodMode || (balance - totalSpent) >= cost) {
                item.count += qty;
                totalSpent += cost;
                document.getElementById(`cnt-${id}`).innerText = item.count.toLocaleString();
                
                // 5. Man Utd Love
                if(item.name.includes("สโมสรแมนยู")) {
                    for(let i=0; i<20; i++) spawnParticle('❤️');
                } 
                // 10. Roblox OOF
                else if(item.name.includes("กองทัพหุ่นยนต์")) {
                    for(let i=0; i<5; i++) spawnParticle('OOF!');
                }
                else {
                    spawnParticle();
                }
                updateUI();
            } else {
                // 1. The Insult & Shake
                document.body.classList.add('screen-shake');
                setTimeout(() => document.body.classList.remove('screen-shake'), 400);
                alert("ตังไม่พอไอ้จนไอ้ขมวยหัวเคน");
            }
        }

        function renderReceipt() {
            const bought = items.filter(x => x.count > 0);
            const content = document.getElementById('receipt-content');
            if(bought.length > 10) {
                document.getElementById('receipt-header').innerText = "มหาตำนานความรวย ACHI";
                document.getElementById('receipt-box').style.borderColor = "#d4af37";
            }
            if(bought.length === 0) return;
            content.innerHTML = bought.map(x => `
                <div class="flex justify-between items-center border-b border-zinc-900 pb-3">
                    <span class="text-white font-bold text-[10px] md:text-base">${x.emoji} ${x.name} <small class="text-zinc-600 ml-1">x${x.count}</small></span>
                    <span class="text-yellow-600 font-mono font-bold text-[10px] md:text-base">$${(x.price * x.count).toLocaleString()}</span>
                </div>
            `).join('');
        }

        const grid = document.getElementById('item-grid');
        items.forEach(item => {
            const div = document.createElement('div');
            // ลด Padding (p-2) และปรับขนาด Card ให้พอดีกับ 3 คอลัมน์ในมือถือ
            div.className = 'item-card p-2 md:p-10 rounded-2xl md:rounded-[3rem] text-center';
            div.innerHTML = `
                <div class="text-2xl md:text-7xl mb-2 md:mb-6 emoji-icon">${item.emoji}</div>
                <h3 class="text-[8px] md:text-xl font-black text-white mb-1 h-8 md:h-16 flex items-center justify-center leading-tight">${item.name}</h3>
                <p class="text-yellow-500 font-black text-[8px] md:text-lg mb-2 md:mb-6 tracking-tighter">$${item.price.toLocaleString()}</p>
                <div class="bg-black/50 py-1 md:py-4 rounded-lg md:rounded-2xl mb-2 md:mb-6 border border-zinc-800">
                    <span id="cnt-${item.id}" class="text-xs md:text-3xl font-black gold-gradient">0</span>
                </div>
                <input type="number" id="in-${item.id}" placeholder="0" class="w-full bg-zinc-900 border border-zinc-800 text-center py-1 md:py-4 rounded-lg md:rounded-2xl mb-2 text-white font-bold text-xs md:text-xl outline-none focus:border-yellow-500">
                <button onclick="buy(${item.id})" class="w-full bg-yellow-600 text-black py-2 md:py-5 rounded-lg md:rounded-2xl font-black hover:bg-yellow-400 active:scale-95 transition-all shadow-lg text-[8px] md:text-base">ซื้อไอ้ขมวย</button>
            `;
            grid.appendChild(div);
        });

        // 3. Title Hue Rotate
        document.getElementById('title-main').onclick = function() {
            this.style.filter = `hue-rotate(${Math.random()*360}deg)`;
            cheatX2();
        };
        
        // 4. Disco Background
        document.getElementById('title-main').ondblclick = function() {
            document.body.style.backgroundColor = `hsl(${Math.random() * 360}, 50%, 10%)`;
            for(let i=0; i<30; i++) spawnParticle('✨');
        };

        // 9. GodVerse Mode (Long Press)
        let timer;
        const balBtn = document.getElementById('balance-display');
        balBtn.addEventListener('mousedown', () => { timer = setTimeout(() => { isGodMode = true; updateUI(); alert("ปลดล็อกโหมด GodVerse: มิติที่ 5 ทำงาน!"); }, 2000); });
        balBtn.addEventListener('mouseup', () => clearTimeout(timer));
        balBtn.addEventListener('touchstart', () => { timer = setTimeout(() => { isGodMode = true; updateUI(); alert("ปลดล็อกโหมด GodVerse: มิติที่ 5 ทำงาน!"); }, 2000); });
        balBtn.addEventListener('touchend', () => clearTimeout(timer));

        updateUI();
    </script>
</body>
</html>
